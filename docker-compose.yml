services:
  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  # Optional SQL initialization
  backend:
    build:
      context: ./be
    ports:
      - "5001:5001"  # Access the backend at localhost:5000
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydatabase  # Database connection URL
    volumes:
      - ./be/app:/app  # Mount backend code (optional if you need live refresh on the backend as well)

  frontend:
    build:
      context: ./fe
    ports:
      - "3000:3000"  # Access the frontend at localhost:3000
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://backend:8000
    volumes:
      - ./fe/src:/tourism/src  # Correct mounting to match expected structure
      - /tourism/node_modules  # To avoid overwriting node_modules


volumes:
  db_data:  # Define the 'db_data' volume here
