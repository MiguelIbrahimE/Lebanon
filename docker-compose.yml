
services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"  # Access the frontend at localhost:3000
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:5000  # Or wherever your backend is

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"  # Access the backend at localhost:5000
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/mydatabase  # Update with actual credentials

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql  # If you have SQL initialization

volumes:
  db_data:
